<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Repair Shop Tracker</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1B1E24" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Repairs" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;}</style>
</head>
<body>
<style>
  :root{
    --bg:#1B1E24;
    --surface:#242830;
    --surface-2:#2C313B;
    --line:#3A4048;
    --text:#EDEAE3;
    --text-dim:#9AA1AC;
    --amber:#F2A33C;
    --amber-dim:#7A5A2A;
    --teal:#4FB0A0;
    --red:#E1584B;
    --blue:#5C9DE0;
    --purple:#A084DC;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
    --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  .rst-root{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-sans);
    min-height:100vh;
    padding:0;
    -webkit-font-smoothing:antialiased;
  }
  .rst-topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    border-bottom:1px solid var(--line);
    background:var(--surface);
    position:sticky;top:0;z-index:20;
  }
  .rst-brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .rst-logo{
    width:38px;height:38px;border-radius:10px;object-fit:cover;
    background:#fff;
    flex-shrink:0;
  }
  .rst-brand-text .tag{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.12em;
    color:var(--amber);
    display:block;
  }
  .rst-brand-text h1{
    font-size:17px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
    line-height:1.2;
  }
  .rst-topbar-actions{display:flex;gap:8px;align-items:center;}
  .rst-btn{
    font-family:var(--font-sans);
    font-size:13px;
    font-weight:600;
    padding:9px 14px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--surface-2);
    color:var(--text);
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:border-color .15s, transform .1s;
  }
  .rst-btn:hover{border-color:var(--text-dim);}
  .rst-btn:active{transform:scale(0.97);}
  .rst-btn-primary{
    background:var(--amber);
    color:#1B1E24;
    border-color:var(--amber);
  }
  .rst-btn-primary:hover{background:#f5b45c;}
  .rst-btn-icon{
    width:38px;height:38px;padding:0;justify-content:center;font-size:16px;
  }
  .rst-main{padding:18px 20px 100px;max-width:1200px;margin:0 auto;}

  /* Floating add button */
  .rst-fab{
    position:fixed;
    right:20px;
    bottom:24px;
    width:58px;height:58px;
    border-radius:50%;
    background:var(--amber);
    color:#1B1E24;
    border:none;
    font-size:28px;
    font-weight:400;
    line-height:1;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 18px rgba(242,163,60,0.4), 0 2px 6px rgba(0,0,0,0.3);
    cursor:pointer;
    z-index:40;
    transition:transform .12s, box-shadow .15s;
  }
  .rst-fab:hover{box-shadow:0 8px 22px rgba(242,163,60,0.5), 0 2px 6px rgba(0,0,0,0.3);}
  .rst-fab:active{transform:scale(0.92);}

  /* Toast */
  .rst-toast-area{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%);
    z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center;
    pointer-events:none;
  }
  .rst-toast{
    background:#2F343E;
    border:1px solid var(--line);
    color:var(--text);
    padding:11px 18px;
    border-radius:24px;
    font-size:13px;
    font-weight:600;
    box-shadow:0 6px 20px rgba(0,0,0,0.35);
    display:flex;align-items:center;gap:8px;
    animation:rst-toast-in .18s ease-out;
  }
  .rst-toast.success{border-color:rgba(79,176,160,0.4);}
  .rst-toast.success .dot{color:var(--teal);}
  .rst-toast.err{border-color:rgba(225,88,75,0.4);}
  .rst-toast.err .dot{color:var(--red);}
  @keyframes rst-toast-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .rst-controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:16px;
  }
  .rst-search{
    flex:1;
    min-width:200px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 14px;
    color:var(--text);
    font-size:14px;
    font-family:var(--font-sans);
  }
  .rst-search:focus{outline:none;border-color:var(--amber-dim);}
  .rst-filter-pill{
    font-family:var(--font-mono);
    font-size:11.5px;
    letter-spacing:0.03em;
    padding:8px 12px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--text-dim);
    cursor:pointer;
    white-space:nowrap;
  }
  .rst-filter-pill.active{
    border-color:var(--amber);
    color:var(--amber);
    background:rgba(242,163,60,0.08);
  }

  .rst-empty{
    text-align:center;
    padding:70px 20px;
    color:var(--text-dim);
  }
  .rst-empty .big{font-size:48px;margin-bottom:14px;}
  .rst-empty .cta-sub{font-size:12.5px;margin-top:6px;color:var(--text-dim);}

  .rst-list{display:flex;flex-direction:column;gap:10px;}

  .rst-ticket{
    position:relative;
    display:grid;
    grid-template-columns:14px 1fr auto;
    align-items:stretch;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:border-color .15s, transform .1s;
  }
  .rst-ticket:hover{border-color:var(--text-dim);}
  .rst-ticket:active{transform:scale(0.995);}
  .rst-ticket-stub{
    background:var(--stub-color, var(--text-dim));
    position:relative;
  }
  .rst-ticket-stub::before, .rst-ticket-stub::after{
    content:'';
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:10px;height:10px;
    background:var(--bg);
    border-radius:50%;
  }
  .rst-ticket-stub::before{top:-5px;}
  .rst-ticket-stub::after{bottom:-5px;}

  .rst-ticket-body{
    padding:14px 16px;
    display:grid;
    grid-template-columns:100px 1.4fr 1fr 1fr;
    gap:10px 16px;
    align-items:center;
  }
  .rst-ticket-id{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-dim);
  }
  .rst-ticket-customer{font-weight:700;font-size:15px;}
  .rst-ticket-sub{font-size:12.5px;color:var(--text-dim);margin-top:2px;}
  .rst-ticket-unit{font-size:13.5px;display:flex;align-items:center;gap:6px;}
  .rst-ticket-unit .icon{font-size:18px;}
  .rst-ticket-unit .type{font-size:11.5px;color:var(--text-dim);}
  .rst-ticket-meta{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:4px;
    text-align:right;
  }
  .rst-status{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.05em;
    padding:3px 8px;
    border-radius:20px;
    white-space:nowrap;
  }
  .rst-price{font-family:var(--font-mono);font-size:13px;color:var(--text-dim);}
  .rst-updated{font-size:10.5px;color:var(--text-dim);opacity:0.8;}
  .rst-ticket-side{
    display:flex;
    align-items:center;
    padding:0 14px;
    border-left:1px dashed var(--line);
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-dim);
    text-align:center;
    max-width:110px;
  }

  /* Modal */
  .rst-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.55);
    display:flex;align-items:flex-start;justify-content:center;
    padding:40px 16px;
    overflow-y:auto;
    z-index:50;
  }
  .rst-modal{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    width:100%;
    max-width:520px;
    padding:22px;
  }
  .rst-modal h2{margin:0 0 4px;font-size:18px;}
  .rst-modal .sub{color:var(--text-dim);font-size:12.5px;margin-bottom:18px;}
  .rst-field{margin-bottom:14px;}
  .rst-field label{
    display:block;
    font-size:11.5px;
    font-family:var(--font-mono);
    letter-spacing:0.04em;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  .rst-field input, .rst-field select, .rst-field textarea{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 11px;
    color:var(--text);
    font-family:var(--font-sans);
    font-size:14px;
  }
  .rst-field textarea{resize:vertical;min-height:60px;}
  .rst-field input:focus, .rst-field select:focus, .rst-field textarea:focus{
    outline:none;border-color:var(--amber-dim);
  }
  .rst-phone-row{display:flex;gap:8px;}
  .rst-phone-prefix{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    color:var(--text-dim);
    font-family:var(--font-mono);
    font-size:14px;
    display:flex;align-items:center;
    flex-shrink:0;
  }
  .rst-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .rst-modal-actions{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:20px;gap:10px;flex-wrap:wrap;
  }
  .rst-btn-danger{background:transparent;color:var(--red);border-color:var(--red);}
  .rst-btn-danger:hover{background:rgba(225,88,75,0.1);}
  .rst-btn-outline{background:transparent;border-color:var(--amber-dim);color:var(--amber);}
  .rst-btn-outline:hover{background:rgba(242,163,60,0.08);}
  .rst-link-btn{
    background:none;border:none;color:var(--text-dim);
    font-size:12.5px;cursor:pointer;text-decoration:underline;
  }
  .rst-banner{
    font-size:12.5px;
    padding:10px 12px;
    border-radius:8px;
    margin-bottom:14px;
  }
  .rst-banner.err{background:rgba(225,88,75,0.12);color:#f0958b;border:1px solid rgba(225,88,75,0.3);}
  .rst-banner.info{background:rgba(92,157,224,0.12);color:#9dc4ee;border:1px solid rgba(92,157,224,0.3);}
  .rst-spinner{
    width:16px;height:16px;border-radius:50%;
    border:2px solid var(--line);border-top-color:var(--amber);
    animation:rst-spin 0.7s linear infinite;
  }
  @keyframes rst-spin{to{transform:rotate(360deg);}}
  .rst-loading-row{display:flex;align-items:center;gap:10px;color:var(--text-dim);font-size:13px;padding:30px;justify-content:center;}

  .rst-section-title{
    font-family:var(--font-mono);font-size:11.5px;letter-spacing:0.06em;
    color:var(--amber);margin:20px 0 10px;padding-top:14px;border-top:1px dashed var(--line);
  }
  .rst-price-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
  .rst-price-row input{
    background:var(--surface-2);border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;color:var(--text);font-family:var(--font-sans);font-size:13px;
  }
  .rst-price-row .svc-name{flex:1.4;}
  .rst-price-row .svc-price{flex:1;font-family:var(--font-mono);}
  .rst-price-row .rm{
    background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;
    width:28px;height:28px;flex-shrink:0;
  }
  .rst-price-row .rm:hover{color:var(--red);}
  .rst-add-row-btn{
    background:none;border:1px dashed var(--line);color:var(--text-dim);
    border-radius:8px;padding:8px 12px;font-size:12.5px;cursor:pointer;width:100%;
    font-family:var(--font-sans);
  }
  .rst-add-row-btn:hover{border-color:var(--amber-dim);color:var(--amber);}

  /* Printable claim stub */
  .rst-print-area{display:none;}
  @media print{
    @page{margin:6mm;size:auto;}
    body *{visibility:hidden;}
    .rst-print-area, .rst-print-area *{visibility:visible;}
    .rst-print-area{
      display:block;
      position:absolute;top:0;left:0;
      width:60mm;
      padding:6px;color:#000;font-family:var(--font-sans);
    }
  }
  .rst-stub-label{font-size:8.5px;letter-spacing:0.12em;text-align:center;color:#555;margin:0 0 6px;}
  .rst-stub-id{
    font-family:var(--font-mono);font-size:20px;font-weight:700;text-align:center;
    border:1.5px dashed #000;border-radius:5px;padding:4px;margin-bottom:8px;letter-spacing:0.03em;
  }
  .rst-stub-row{display:flex;justify-content:space-between;gap:6px;font-size:10px;padding:3px 0;border-bottom:1px solid #ddd;}
  .rst-stub-row b{font-weight:700;text-align:right;}

  @media (max-width:720px){
    .rst-ticket-body{grid-template-columns:1fr;}
    .rst-ticket-meta{align-items:flex-start;text-align:left;}
    .rst-ticket-side{display:none;}
    .rst-row2{grid-template-columns:1fr;}
    .rst-brand-text h1{font-size:15.5px;}
  }
</style>

<div class="rst-root" id="rst-root">
  <div class="rst-topbar">
    <div class="rst-brand">
      <img class="rst-logo" id="rst-logo-img" src="icons/icon-192.png" alt="" onerror="this.style.display='none'" />
      <div class="rst-brand-text">
        <span class="tag">TICKETS</span>
        <h1 id="rst-shop-name">Repair Tracker</h1>
      </div>
    </div>
    <div class="rst-topbar-actions">
      <button class="rst-btn rst-btn-icon" id="rst-settings-btn" title="Settings">⚙</button>
    </div>
  </div>

  <div class="rst-main">
    <div id="rst-banner-area"></div>

    <div class="rst-controls">
      <input class="rst-search" id="rst-search" placeholder="🔍 Search customer, phone, unit, or ticket ID…" />
      <div id="rst-filters" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    </div>

    <div id="rst-list-area"></div>
  </div>

  <button class="rst-fab" id="rst-fab-btn" title="New Ticket">+</button>
</div>

<div id="rst-modal-root"></div>
<div class="rst-toast-area" id="rst-toast-area"></div>
<div class="rst-print-area" id="rst-print-area"></div>

<script>
(function(){
  const STATUSES = [
    { key: 'Received', color: '#5C9DE0' },
    { key: 'Diagnosing', color: '#A084DC' },
    { key: 'In Repair', color: '#F2A33C' },
    { key: 'Waiting for Parts', color: '#E1584B' },
    { key: 'Ready for Pickup', color: '#4FB0A0' },
    { key: 'Released', color: '#6b7280' }
  ];
  const UNIT_TYPES = [
    { key: 'Laptop', icon: '💻' },
    { key: 'Desktop', icon: '🖥️' },
    { key: 'Phone', icon: '📱' },
    { key: 'Tablet', icon: '📲' },
    { key: 'Printer', icon: '🖨️' },
    { key: 'Monitor', icon: '🖥️' },
    { key: 'Other', icon: '🔧' }
  ];
  const DEFAULT_PRICE_LIST = [
    { name: 'Diagnostics (minimum)', price: '250' },
    { name: 'Cleaning / Dust Removal', price: '300' },
    { name: 'OS Reinstall', price: '500' },
    { name: 'Screen Replacement (labor)', price: '600' }
  ];

  let API_URL = '';
  let SHOP_PHONE = '9216236104';
  let PRICE_LIST = DEFAULT_PRICE_LIST.slice();
  let records = [];
  let activeStatusFilter = 'All';
  let searchTerm = '';
  let loading = false;

  const listArea = document.getElementById('rst-list-area');
  const bannerArea = document.getElementById('rst-banner-area');
  const modalRoot = document.getElementById('rst-modal-root');
  const filtersEl = document.getElementById('rst-filters');
  const toastArea = document.getElementById('rst-toast-area');
  const printArea = document.getElementById('rst-print-area');

  function unitIcon(type){
    const u = UNIT_TYPES.find(u => u.key === type);
    return u ? u.icon : '🔧';
  }

  function statusColor(status){
    const s = STATUSES.find(s => s.key === status);
    return s ? s.color : '#6b7280';
  }

  function escapeHtml(str){
    return String(str == null ? '' : str).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function showToast(msg, type){
    const el = document.createElement('div');
    el.className = 'rst-toast ' + (type || '');
    el.innerHTML = '<span class="dot">●</span> ' + escapeHtml(msg);
    toastArea.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .25s'; setTimeout(() => el.remove(), 250); }, 2400);
  }

  function showBanner(msg, type){
    bannerArea.innerHTML = '<div class="rst-banner ' + type + '">' + escapeHtml(msg) + '</div>';
  }
  function clearBanner(){ bannerArea.innerHTML = ''; }

  function renderFilters(){
    const counts = {};
    records.forEach(r => { counts[r['Status']] = (counts[r['Status']]||0) + 1; });
    let html = '<button class="rst-filter-pill ' + (activeStatusFilter==='All'?'active':'') + '" data-status="All">ALL · ' + records.length + '</button>';
    STATUSES.forEach(s => {
      html += '<button class="rst-filter-pill ' + (activeStatusFilter===s.key?'active':'') + '" data-status="' + s.key + '" style="' + (activeStatusFilter===s.key ? 'border-color:'+s.color+';color:'+s.color+';' : '') + '">' + s.key.toUpperCase() + ' · ' + (counts[s.key]||0) + '</button>';
    });
    filtersEl.innerHTML = html;
    filtersEl.querySelectorAll('.rst-filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        activeStatusFilter = btn.getAttribute('data-status');
        renderFilters();
        renderList();
      });
    });
  }

  function filteredRecords(){
    return records.filter(r => {
      if (activeStatusFilter !== 'All' && r['Status'] !== activeStatusFilter) return false;
      if (searchTerm){
        const hay = [r['ID'], r['Customer Name'], r['Phone'], r['Unit'], r['Unit Type']].join(' ').toLowerCase();
        if (!hay.includes(searchTerm.toLowerCase())) return false;
      }
      return true;
    }).sort((a,b) => (b['Created At']||'').localeCompare(a['Created At']||''));
  }

  function renderList(){
    if (loading){
      listArea.innerHTML = '<div class="rst-loading-row"><span class="rst-spinner"></span> Loading tickets…</div>';
      return;
    }
    if (!API_URL){
      listArea.innerHTML = '<div class="rst-empty"><div class="big">🧰</div><div>Set up your Google Sheet connection first.</div><br/><button class="rst-btn rst-btn-primary" id="rst-empty-settings">Open Settings</button></div>';
      const b = document.getElementById('rst-empty-settings');
      if (b) b.addEventListener('click', openSettingsModal);
      return;
    }
    const list = filteredRecords();
    if (list.length === 0){
      listArea.innerHTML = '<div class="rst-empty"><div class="big">🗂️</div><div>No tickets match right now.</div><div class="cta-sub">Tap the + button to add your first ticket.</div></div>';
      return;
    }
    listArea.innerHTML = '<div class="rst-list">' + list.map(ticketHtml).join('') + '</div>';
    listArea.querySelectorAll('.rst-ticket').forEach(el => {
      el.addEventListener('click', () => openEditModal(el.getAttribute('data-id')));
    });
  }

  function ticketHtml(r){
    const color = statusColor(r['Status']);
    const price = r['Price'] ? ('₱' + Number(r['Price']).toLocaleString()) : '—';
    const date = r['Date In'] ? formatDate(r['Date In']) : '—';
    const updated = r['Last Updated'] ? ('Updated ' + formatDateTime(r['Last Updated'])) : '';
    return '' +
      '<div class="rst-ticket" data-id="' + escapeHtml(r['ID']) + '">' +
        '<div class="rst-ticket-stub" style="--stub-color:' + color + '"></div>' +
        '<div class="rst-ticket-body">' +
          '<div><div class="rst-ticket-id">' + escapeHtml(r['ID']) + '</div><div class="rst-ticket-sub">' + date + '</div></div>' +
          '<div><div class="rst-ticket-customer">' + escapeHtml(r['Customer Name'] || 'Unnamed') + '</div><div class="rst-ticket-sub">' + escapeHtml(formatPhoneDisplay(r['Phone'])||'') + '</div></div>' +
          '<div class="rst-ticket-unit"><span class="icon">' + unitIcon(r['Unit Type']) + '</span><div><div>' + escapeHtml(r['Unit']||'—') + '</div><div class="type">' + escapeHtml(r['Unit Type']||'') + '</div></div></div>' +
          '<div class="rst-ticket-meta">' +
            '<span class="rst-status" style="background:' + color + '22;color:' + color + ';border:1px solid ' + color + '55;">' + escapeHtml(r['Status']||'') + '</span>' +
            '<span class="rst-price">' + price + '</span>' +
            (updated ? '<span class="rst-updated">' + updated + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="rst-ticket-side">' + (r['Release Technician'] ? ('OUT · ' + escapeHtml(r['Release Technician'])) : '') + '</div>' +
      '</div>';
  }

  function formatDate(d){
    try{
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return d;
      return dt.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'});
    }catch(e){ return d; }
  }
  function formatDateTime(d){
    try{
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return d;
      return dt.toLocaleDateString(undefined, {month:'short', day:'numeric'}) + ' ' + dt.toLocaleTimeString(undefined, {hour:'numeric', minute:'2-digit'});
    }catch(e){ return d; }
  }

  function formatPhoneDisplay(p){
    if (!p) return '';
    return p;
  }

  function digitsOnly(s){ return (s||'').replace(/\D/g, ''); }

  function formatPhStore(localDigits){
    const d = digitsOnly(localDigits).slice(0,10);
    if (!d) return '';
    const p1 = d.slice(0,3), p2 = d.slice(3,6), p3 = d.slice(6,10);
    return '+63 ' + [p1,p2,p3].filter(Boolean).join(' ');
  }

  function stripToLocalDigits(phone){
    let d = digitsOnly(phone);
    if (d.startsWith('63')) d = d.slice(2);
    if (d.startsWith('0')) d = d.slice(1);
    return d.slice(0,10);
  }

  async function callApi(action, params){
    if (!API_URL) throw new Error('No Web App URL configured yet.');
    params = params || {};
    const url = new URL(API_URL);
    url.searchParams.set('action', action);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    const res = await fetch(url.toString());
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Request failed');
    return json.data;
  }

  async function loadRecords(){
    loading = true; renderList();
    try{
      const data = await callApi('list');
      records = data;
      clearBanner();
    }catch(err){
      showBanner('Could not load tickets: ' + err.message, 'err');
    }finally{
      loading = false;
      renderFilters();
      renderList();
    }
  }

  // ---------- Settings modal ----------
  function priceRowHtml(item, idx){
    return '<div class="rst-price-row" data-idx="' + idx + '">' +
      '<input class="svc-name" type="text" value="' + escapeHtml(item.name) + '" placeholder="Service name" />' +
      '<input class="svc-price" type="number" value="' + escapeHtml(item.price) + '" placeholder="₱" />' +
      '<button class="rm" title="Remove">✕</button>' +
    '</div>';
  }

  function readPriceListFromDom(container){
    const rows = container.querySelectorAll('.rst-price-row');
    const list = [];
    rows.forEach(row => {
      const name = row.querySelector('.svc-name').value.trim();
      const price = row.querySelector('.svc-price').value.trim();
      if (name || price) list.push({ name: name, price: price });
    });
    return list;
  }

  function openSettingsModal(){
    const priceRowsHtml = PRICE_LIST.map(priceRowHtml).join('');
    modalRoot.innerHTML = '' +
      '<div class="rst-overlay" id="rst-overlay">' +
        '<div class="rst-modal">' +
          '<h2>Settings</h2>' +
          '<div class="sub">Connection and shop details, saved on this device.</div>' +
          '<div class="rst-field">' +
            '<label>WEB APP URL (Google Sheet)</label>' +
            '<input type="text" id="rst-url-input" placeholder="https://script.google.com/macros/s/…/exec" value="' + escapeHtml(API_URL) + '" />' +
          '</div>' +
          '<div class="rst-field">' +
            '<label>SHOP NAME</label>' +
            '<input type="text" id="rst-shopname-input" placeholder="e.g. Compair Computer Sales and Repair" value="' + escapeHtml(document.getElementById('rst-shop-name').textContent === 'Repair Tracker' ? '' : document.getElementById('rst-shop-name').textContent) + '" />' +
          '</div>' +
          '<div class="rst-field">' +
            '<label>SHOP CONTACT NUMBER</label>' +
            '<div class="rst-phone-row"><span class="rst-phone-prefix">+63</span><input type="text" id="rst-phone-input" placeholder="921 623 6104" value="' + escapeHtml(SHOP_PHONE) + '" /></div>' +
          '</div>' +

          '<div class="rst-section-title">SERVICE PRICE LIST (for future reference / Messenger bot)</div>' +
          '<div class="sub" style="margin-top:-6px;">Set minimum or standard prices per service. You can adjust these anytime.</div>' +
          '<div id="rst-price-rows">' + priceRowsHtml + '</div>' +
          '<button class="rst-add-row-btn" id="rst-add-price-row">+ Add service</button>' +

          '<div class="rst-modal-actions">' +
            '<span></span>' +
            '<div style="display:flex;gap:8px;">' +
              '<button class="rst-btn" id="rst-cancel-settings">Cancel</button>' +
              '<button class="rst-btn rst-btn-primary" id="rst-save-settings">Save</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.getElementById('rst-cancel-settings').addEventListener('click', closeModal);
    document.getElementById('rst-overlay').addEventListener('click', e => { if (e.target.id === 'rst-overlay') closeModal(); });
    const rowsContainer = document.getElementById('rst-price-rows');
    rowsContainer.addEventListener('click', e => {
      if (e.target.classList.contains('rm')) e.target.closest('.rst-price-row').remove();
    });
    document.getElementById('rst-add-price-row').addEventListener('click', () => {
      rowsContainer.insertAdjacentHTML('beforeend', priceRowHtml({name:'',price:''}, rowsContainer.children.length));
    });
    document.getElementById('rst-save-settings').addEventListener('click', () => {
      const url = document.getElementById('rst-url-input').value.trim();
      const shopName = document.getElementById('rst-shopname-input').value.trim();
      const phone = digitsOnly(document.getElementById('rst-phone-input').value).slice(0,10);
      if (!url){ showBanner('Please paste a Web App URL.', 'err'); return; }
      API_URL = url;
      SHOP_PHONE = phone;
      PRICE_LIST = readPriceListFromDom(rowsContainer);
      try{
        localStorage.setItem('api_url', url);
        localStorage.setItem('shop_phone', phone);
        localStorage.setItem('price_list', JSON.stringify(PRICE_LIST));
        if (shopName){
          localStorage.setItem('shop_name', shopName);
          document.getElementById('rst-shop-name').textContent = shopName;
        }
      }catch(e){ /* storage best-effort */ }
      closeModal();
      showToast('Settings saved', 'success');
      loadRecords();
    });
  }

  function closeModal(){ modalRoot.innerHTML = ''; }

  // ---------- New / Edit modal ----------
  function fieldTemplate(r){
    r = r || {};
    return '' +
      '<div class="rst-field">' +
        '<label>CUSTOMER NAME</label>' +
        '<input type="text" id="f-customer" value="' + escapeHtml(r['Customer Name']||'') + '" placeholder="Juan Dela Cruz" />' +
      '</div>' +
      '<div class="rst-row2">' +
        '<div class="rst-field"><label>PHONE (OPTIONAL)</label><div class="rst-phone-row"><span class="rst-phone-prefix">+63</span><input type="text" id="f-phone" value="' + escapeHtml(stripToLocalDigits(r['Phone'])) + '" placeholder="921 623 6104" /></div></div>' +
        '<div class="rst-field"><label>DATE IN</label><input type="date" id="f-date" value="' + escapeHtml(toDateInputValue(r['Date In'])) + '" /></div>' +
      '</div>' +
      '<div class="rst-row2">' +
        '<div class="rst-field"><label>UNIT / MODEL (OPTIONAL)</label><input type="text" id="f-unit" value="' + escapeHtml(r['Unit']||'') + '" placeholder="e.g. ASUS TUF F15" /></div>' +
        '<div class="rst-field"><label>UNIT TYPE</label><select id="f-unittype">' + UNIT_TYPES.map(t => '<option value="'+t.key+'" '+(r['Unit Type']===t.key?'selected':'')+'>'+t.icon+' '+t.key+'</option>').join('') + '</select></div>' +
      '</div>' +
      '<div class="rst-row2">' +
        '<div class="rst-field"><label>STATUS</label><select id="f-status">' + STATUSES.map(s => '<option value="'+s.key+'" '+(r['Status']===s.key?'selected':'')+'>'+s.key+'</option>').join('') + '</select></div>' +
        '<div class="rst-field"><label>PRICE ₱ (OPTIONAL)</label><input type="number" id="f-price" value="' + escapeHtml(r['Price']||'') + '" placeholder="0" /></div>' +
      '</div>' +
      '<div class="rst-field"><label>RELEASE TECHNICIAN (OPTIONAL)</label><input type="text" id="f-tech" value="' + escapeHtml(r['Release Technician']||'') + '" placeholder="Who released / is handling this unit" /></div>' +
      '<div class="rst-field"><label>UNIT PASSWORD (OPTIONAL)</label><input type="text" id="f-password" value="' + escapeHtml(r['Password']||'') + '" placeholder="Login password / PIN, for repair access only" /></div>' +
      '<div class="rst-field"><label>NOTES (OPTIONAL)</label><textarea id="f-notes" placeholder="Diagnosis, parts needed, customer requests…">' + escapeHtml(r['Notes']||'') + '</textarea></div>';
  }

  function toDateInputValue(d){
    if (!d) return new Date().toISOString().slice(0,10);
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return new Date().toISOString().slice(0,10);
    return dt.toISOString().slice(0,10);
  }

  function readForm(){
    return {
      'Customer Name': document.getElementById('f-customer').value.trim(),
      'Phone': formatPhStore(document.getElementById('f-phone').value),
      'Unit': document.getElementById('f-unit').value.trim(),
      'Unit Type': document.getElementById('f-unittype').value,
      'Status': document.getElementById('f-status').value,
      'Date In': document.getElementById('f-date').value,
      'Price': document.getElementById('f-price').value,
      'Release Technician': document.getElementById('f-tech').value.trim(),
      'Password': document.getElementById('f-password').value.trim(),
      'Notes': document.getElementById('f-notes').value.trim()
    };
  }

  function openNewModal(){
    if (!API_URL){ openSettingsModal(); return; }
    modalRoot.innerHTML = '' +
      '<div class="rst-overlay" id="rst-overlay">' +
        '<div class="rst-modal">' +
          '<h2>New Ticket</h2>' +
          '<div class="sub">Only Customer Name is required — fill the rest as you go.</div>' +
          '<div id="rst-modal-banner"></div>' +
          fieldTemplate({'Status':'Received'}) +
          '<div class="rst-modal-actions">' +
            '<span></span>' +
            '<div style="display:flex;gap:8px;">' +
              '<button class="rst-btn" id="rst-cancel">Cancel</button>' +
              '<button class="rst-btn rst-btn-primary" id="rst-save">Create Ticket</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.getElementById('rst-cancel').addEventListener('click', closeModal);
    document.getElementById('rst-overlay').addEventListener('click', e => { if (e.target.id === 'rst-overlay') closeModal(); });
    document.getElementById('rst-save').addEventListener('click', async () => {
      const record = readForm();
      if (!record['Customer Name']){
        document.getElementById('rst-modal-banner').innerHTML = '<div class="rst-banner err">Customer name is required.</div>';
        return;
      }
      const btn = document.getElementById('rst-save');
      btn.disabled = true; btn.textContent = 'Saving…';
      try{
        const created = await callApi('add', { data: JSON.stringify(record) });
        closeModal();
        showToast('Ticket created', 'success');
        await loadRecords();
        offerPrint(created['ID']);
      }catch(err){
        document.getElementById('rst-modal-banner').innerHTML = '<div class="rst-banner err">' + escapeHtml(err.message) + '</div>';
        btn.disabled = false; btn.textContent = 'Create Ticket';
      }
    });
  }

  function offerPrint(id){
    const r = records.find(x => x['ID'] === id);
    if (!r) return;
    modalRoot.innerHTML = '' +
      '<div class="rst-overlay" id="rst-overlay">' +
        '<div class="rst-modal" style="max-width:380px;text-align:center;">' +
          '<div style="font-size:36px;margin-bottom:6px;">✅</div>' +
          '<h2>Ticket ' + escapeHtml(r['ID']) + ' created</h2>' +
          '<div class="sub">Print a unit tag sticker to stick on the device now?</div>' +
          '<div class="rst-modal-actions" style="justify-content:center;">' +
            '<button class="rst-btn" id="rst-skip-print">Skip</button>' +
            '<button class="rst-btn rst-btn-primary" id="rst-do-print">🖨️ Print Unit Tag</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.getElementById('rst-skip-print').addEventListener('click', closeModal);
    document.getElementById('rst-overlay').addEventListener('click', e => { if (e.target.id === 'rst-overlay') closeModal(); });
    document.getElementById('rst-do-print').addEventListener('click', () => { printStub(r); closeModal(); });
  }

  function printStub(r){
    printArea.innerHTML = '' +
      '<div class="rst-stub-label">UNIT TAG · STICK ON DEVICE</div>' +
      '<div class="rst-stub-id">' + escapeHtml(r['ID']) + '</div>' +
      '<div class="rst-stub-row"><span>Customer</span><b>' + escapeHtml(r['Customer Name']||'—') + '</b></div>' +
      '<div class="rst-stub-row"><span>Number</span><b>' + escapeHtml(r['Phone']||'—') + '</b></div>' +
      '<div class="rst-stub-row"><span>Issue Date</span><b>' + escapeHtml(r['Date In'] ? formatDate(r['Date In']) : formatDate(r['Created At']||new Date().toISOString())) + '</b></div>' +
      '<div class="rst-stub-row"><span>Password</span><b>' + escapeHtml(r['Password']||'—') + '</b></div>';
    setTimeout(() => window.print(), 50);
  }

  function openEditModal(id){
    const r = records.find(x => x['ID'] === id);
    if (!r) return;
    const updatedLine = r['Last Updated'] ? ('Last updated ' + formatDateTime(r['Last Updated'])) : ('Created ' + (r['Created At'] ? formatDateTime(r['Created At']) : '—'));
    modalRoot.innerHTML = '' +
      '<div class="rst-overlay" id="rst-overlay">' +
        '<div class="rst-modal">' +
          '<h2>Ticket ' + escapeHtml(r['ID']) + '</h2>' +
          '<div class="sub">' + escapeHtml(updatedLine) + '</div>' +
          '<div id="rst-modal-banner"></div>' +
          fieldTemplate(r) +
          '<div class="rst-modal-actions">' +
            '<button class="rst-btn rst-btn-danger" id="rst-delete">Delete</button>' +
            '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
              '<button class="rst-btn rst-btn-outline" id="rst-print">🖨️ Print Unit Tag</button>' +
              '<button class="rst-btn" id="rst-cancel">Cancel</button>' +
              '<button class="rst-btn rst-btn-primary" id="rst-save">Save Changes</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.getElementById('rst-cancel').addEventListener('click', closeModal);
    document.getElementById('rst-overlay').addEventListener('click', e => { if (e.target.id === 'rst-overlay') closeModal(); });
    document.getElementById('rst-print').addEventListener('click', () => printStub(r));
    document.getElementById('rst-save').addEventListener('click', async () => {
      const record = readForm();
      record['ID'] = r['ID'];
      const btn = document.getElementById('rst-save');
      btn.disabled = true; btn.textContent = 'Saving…';
      try{
        await callApi('update', { data: JSON.stringify(record) });
        closeModal();
        showToast('Ticket updated', 'success');
        loadRecords();
      }catch(err){
        document.getElementById('rst-modal-banner').innerHTML = '<div class="rst-banner err">' + escapeHtml(err.message) + '</div>';
        btn.disabled = false; btn.textContent = 'Save Changes';
      }
    });
    document.getElementById('rst-delete').addEventListener('click', async () => {
      if (!confirm('Delete ticket ' + r['ID'] + '? This cannot be undone.')) return;
      const btn = document.getElementById('rst-delete');
      btn.disabled = true; btn.textContent = 'Deleting…';
      try{
        await callApi('delete', { id: r['ID'] });
        closeModal();
        showToast('Ticket deleted', 'success');
        loadRecords();
      }catch(err){
        document.getElementById('rst-modal-banner').innerHTML = '<div class="rst-banner err">' + escapeHtml(err.message) + '</div>';
        btn.disabled = false; btn.textContent = 'Delete';
      }
    });
  }

  // ---------- Init ----------
  document.getElementById('rst-settings-btn').addEventListener('click', openSettingsModal);
  document.getElementById('rst-fab-btn').addEventListener('click', openNewModal);
  document.getElementById('rst-search').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderList();
  });

  (function init(){
    try{
      const savedUrl = localStorage.getItem('api_url');
      if (savedUrl) API_URL = savedUrl;
    }catch(e){ /* not set yet */ }
    try{
      const savedName = localStorage.getItem('shop_name');
      if (savedName) document.getElementById('rst-shop-name').textContent = savedName;
    }catch(e){ /* not set yet */ }
    try{
      const savedPhone = localStorage.getItem('shop_phone');
      if (savedPhone) SHOP_PHONE = savedPhone;
    }catch(e){ /* not set yet */ }
    try{
      const savedPrices = localStorage.getItem('price_list');
      if (savedPrices) PRICE_LIST = JSON.parse(savedPrices);
    }catch(e){ /* not set yet */ }

    renderFilters();
    if (API_URL){
      loadRecords();
    }else{
      renderList();
    }
  })();
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
